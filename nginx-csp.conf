# Configuração de CSP para Nginx/EasyPanel
# Adicione este bloco no seu arquivo nginx.conf ou no site configuration

server {
    # ... suas outras configurações
    
    # Content Security Policy para Google Analytics e AdSense
    add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.google-analytics.com https://static.cloudflareinsights.com; connect-src 'self' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.google-analytics.com; img-src 'self' data: https:; font-src 'self' https:; default-src 'self';" always;
    
    # Headers adicionais para segurança e performance
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ... outras configurações
}
