# Configuração de CSP para Apache/EasyPanel
# Adicione no seu .htaccess ou VirtualHost

<IfModule mod_headers.c>
    # Content Security Policy para Google Analytics e AdSense
    Header always set Content-Security-Policy "script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.google-analytics.com https://static.cloudflareinsights.com; connect-src 'self' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.google-analytics.com; img-src 'self' data: https:; font-src 'self' https:; default-src 'self';"
    
    # Headers adicionais
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>
