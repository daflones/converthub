<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Base64 para MP3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #555;
            border: 2px solid #e1e5e9;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.4);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .audio-player {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .audio-player.active {
            display: block;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .file-info {
            background: #e8f4fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .file-info.active {
            display: block;
        }

        .file-info h3 {
            color: #1976D2;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .file-info p {
            color: #555;
            font-size: 0.9rem;
            margin: 5px 0;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .success {
            background: #e8f5e8;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .success.active {
            display: block;
        }

        .drop-zone {
            border: 3px dashed #ddd;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .drop-zone:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .drop-zone.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .drop-zone p {
            color: #666;
            margin-bottom: 10px;
        }

        .drop-zone .icon {
            font-size: 3rem;
            color: #ddd;
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Conversor Base64 para MP3</h1>
        <p class="subtitle">Cole seu código Base64 ou arraste um arquivo para converter e baixar como MP3</p>
        
        <div class="drop-zone" id="dropZone">
            <div class="icon">📁</div>
            <p>Arraste um arquivo Base64 aqui ou clique para selecionar</p>
            <input type="file" id="fileInput" accept=".txt,.base64">
        </div>

        <div class="input-group">
            <label for="base64Input">Código Base64:</label>
            <textarea 
                id="base64Input" 
                placeholder="Cole seu código Base64 aqui...
Exemplo: UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="
            ></textarea>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="convertBase64()">
                🔧 Converter
            </button>
            <button class="btn-secondary" onclick="clearAll()">
                🗑️ Limpar
            </button>
        </div>

        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>
        
        <div class="file-info" id="fileInfo">
            <h3>📊 Informações do Arquivo</h3>
            <p><strong>Tamanho:</strong> <span id="fileSize">-</span></p>
            <p><strong>Tipo:</strong> <span id="fileType">-</span></p>
            <p><strong>Status:</strong> <span id="fileStatus">-</span></p>
        </div>

        <div class="audio-player" id="audioPlayer">
            <h3>🎧 Pré-visualização</h3>
            <audio id="audioElement" controls></audio>
        </div>

        <button class="btn-success" id="downloadBtn" onclick="downloadMP3()" style="display: none;">
            ⬇️ Baixar MP3
        </button>
    </div>

    <script>
        let currentBlob = null;
        let currentFileName = 'audio.mp3';

        // Drag and drop functionality
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const base64Input = document.getElementById('base64Input');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Input.value = e.target.result;
                showSuccess(`Arquivo "${file.name}" carregado com sucesso!`);
            };
            reader.onerror = () => {
                showError('Erro ao ler o arquivo.');
            };
            reader.readAsText(file);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            document.getElementById('successMessage').classList.remove('active');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('active');
            document.getElementById('errorMessage').classList.remove('active');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('successMessage').classList.remove('active');
        }

        function clearAll() {
            base64Input.value = '';
            currentBlob = null;
            hideMessages();
            document.getElementById('fileInfo').classList.remove('active');
            document.getElementById('audioPlayer').classList.remove('active');
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('audioElement').src = '';
        }

        function isValidBase64(str) {
            try {
                // Remove data URL prefix if present
                const base64Data = str.replace(/^data:audio\/mp3;base64,/, '')
                                     .replace(/^data:audio\/mpeg;base64,/, '')
                                     .replace(/^data:audio\/wav;base64,/, '')
                                     .replace(/^data:audio\/x-wav;base64,/, '')
                                     .trim();
                
                // Check if the string is a valid base64
                return base64Data.length % 4 === 0 && /^[A-Za-z0-9+/]*={0,2}$/.test(base64Data);
            } catch (e) {
                return false;
            }
        }

        function convertBase64() {
            hideMessages();
            
            const base64Data = base64Input.value.trim();
            
            if (!base64Data) {
                showError('Por favor, cole um código Base64 válido.');
                return;
            }

            if (!isValidBase64(base64Data)) {
                showError('O código Base64 inserido parece ser inválido.');
                return;
            }

            try {
                // Clean the base64 string
                let cleanBase64 = base64Data;
                
                // Remove data URL prefix if present
                if (base64Data.startsWith('data:')) {
                    cleanBase64 = base64Data.split(',')[1];
                }

                // Convert base64 to blob
                const byteCharacters = atob(cleanBase64);
                const byteNumbers = new Array(byteCharacters.length);
                
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                
                const byteArray = new Uint8Array(byteNumbers);
                currentBlob = new Blob([byteArray], { type: 'audio/mpeg' });
                
                // Create object URL for audio player
                const audioUrl = URL.createObjectURL(currentBlob);
                const audioElement = document.getElementById('audioElement');
                audioElement.src = audioUrl;
                
                // Show file info
                const fileInfo = document.getElementById('fileInfo');
                document.getElementById('fileSize').textContent = formatFileSize(currentBlob.size);
                document.getElementById('fileType').textContent = 'Audio/MPEG (MP3)';
                document.getElementById('fileStatus').textContent = 'Convertido com sucesso';
                fileInfo.classList.add('active');
                
                // Show audio player
                document.getElementById('audioPlayer').classList.add('active');
                
                // Show download button
                document.getElementById('downloadBtn').style.display = 'block';
                
                showSuccess('Base64 convertido com sucesso! Você pode pré-visualizar e baixar o arquivo MP3.');
                
            } catch (error) {
                console.error('Error converting base64:', error);
                showError('Erro ao converter Base64. Verifique se o código está correto.');
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function downloadMP3() {
            if (!currentBlob) {
                showError('Nenhum arquivo para baixar.');
                return;
            }

            const url = URL.createObjectURL(currentBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showSuccess('Download iniciado!');
        }

        // Auto-detect paste events
        base64Input.addEventListener('paste', (e) => {
            setTimeout(() => {
                const pastedText = base64Input.value.trim();
                if (pastedText && isValidBase64(pastedText)) {
                    showSuccess('Base64 detectado! Clique em "Converter" para processar.');
                }
            }, 100);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                convertBase64();
            } else if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                clearAll();
            }
        });
    </script>
</body>
</html>
